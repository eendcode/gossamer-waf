<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/gstatic/css/bulma.min.css">
</head>
<body>
    <section class="hero is-warning">
        <div class="hero-body">
            <p class="title">Processing...</p>
            <p class="subtitle">Are you up to no good?</p>
        </div>
    </section>

    <div class="content has-text-centered">
        <p class="px-6 py-6">Please hang tight while we process your request</p>
        <progress class="progress is-large is-warning" max="100">60%</progress>
    </div>

    <script>
        (function () {
        "use strict";
        
        try {
        // Final redirect: use location.replace so the user won't get this page in history.
        // Small timeout to ensure the script actually executed (and to avoid very aggressive scanners).
        setTimeout(function () {
        try {
        location.replace("/gssmrrdr");
        } catch (e) {
        // fallback: set location.href
        location.href = "/gssmrrdr";
        }
        }, "{{ .Timeout }}");
        } catch (err) {
        // If anything unexpected happens, avoid redirecting to prevent accidental lockouts.
        console.error("Redirect aborted by error:", err);
        }
        })();
    </script>

</body>
</html>
